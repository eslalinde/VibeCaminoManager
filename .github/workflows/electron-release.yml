name: Electron Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./caminomanager/package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

  build-windows:
    name: Build Windows (Cloud + Standalone)
    needs: validate-version
    runs-on: windows-latest
    defaults:
      run:
        working-directory: caminomanager
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caminomanager/package-lock.json

      - run: npm ci

      - name: Compile Electron TypeScript
        run: npx tsc -p electron/tsconfig.json

      # ── Phase 1: Cloud Build ──────────────────────────────────────────
      - name: Build Next.js (Cloud)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}

      - name: Build Electron installer (Cloud)
        run: >
          npx electron-builder --win --publish never
          --config.artifactName "ComunidadCat-Cloud-${version}-Setup.${ext}"

      - name: Move Cloud artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-cloud
          Move-Item -Path release/*.exe -Destination release-cloud/
          Move-Item -Path release/*.exe.blockmap -Destination release-cloud/
          Move-Item -Path release/latest.yml -Destination release-cloud/

      # ── Phase 2: Standalone Build ─────────────────────────────────────
      - name: Clean build output for Standalone
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue out
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue release

      - name: Build Next.js (Standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH

      - name: Build Electron installer (Standalone)
        run: >
          npx electron-builder --win --publish never
          --config.artifactName "ComunidadCat-Standalone-${version}-Setup.${ext}"
          --config.extraMetadata.standalone=true

      # ── Phase 3: Assemble Standalone ZIP ──────────────────────────────
      - name: Assemble Standalone ZIP
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $zipName = "ComunidadCat-Standalone-$version"
          $stageDir = "release/$zipName"

          # Create directory structure
          New-Item -ItemType Directory -Force -Path "$stageDir/deploy/scripts"
          New-Item -ItemType Directory -Force -Path "$stageDir/supabase/migrations"

          # Copy deploy scripts
          Copy-Item -Path "../deploy/Install-Prerequisites.ps1" -Destination "$stageDir/deploy/"
          Copy-Item -Path "../deploy/README-DEPLOY.md" -Destination "$stageDir/deploy/"
          Copy-Item -Path "../deploy/scripts/*" -Destination "$stageDir/deploy/scripts/"

          # Copy supabase config and migrations
          Copy-Item -Path "../supabase/config.toml" -Destination "$stageDir/supabase/"
          Copy-Item -Path "../supabase/seed.sql" -Destination "$stageDir/supabase/"
          Copy-Item -Path "../supabase/migrations/*.sql" -Destination "$stageDir/supabase/migrations/"

          # Copy standalone .exe into ZIP root
          Copy-Item -Path "release/ComunidadCat-Standalone-$version-Setup.exe" -Destination "$stageDir/"

          # Create ZIP
          Compress-Archive -Path "$stageDir" -DestinationPath "release/$zipName.zip"

      # ── Phase 4: Upload all artifacts to release ──────────────────────
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            caminomanager/release-cloud/ComunidadCat-Cloud-*-Setup.exe
            caminomanager/release-cloud/ComunidadCat-Cloud-*-Setup.exe.blockmap
            caminomanager/release-cloud/latest.yml
            caminomanager/release/ComunidadCat-Standalone-*-Setup.exe
            caminomanager/release/ComunidadCat-Standalone-*.zip
