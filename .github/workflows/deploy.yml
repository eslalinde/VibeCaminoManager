name: Deploy Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "caminomanager/**"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
    paths:
      - "caminomanager/**"

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && github.head_ref || 'production' }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/caminomanager"
          api_location: ""
          output_location: "out"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ github.event_name == 'pull_request' && secrets.INTEGRATION_SUPABASE_URL || secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ github.event_name == 'pull_request' && secrets.INTEGRATION_SUPABASE_PUBLISHABLE_DEFAULT_KEY || secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          NEXT_PUBLIC_APPINSIGHTS_CONNECTION_STRING: ${{ github.event_name != 'pull_request' && secrets.APPINSIGHTS_CONNECTION_STRING || '' }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: Close Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          action: "close"
