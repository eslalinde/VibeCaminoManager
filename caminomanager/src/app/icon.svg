<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8913A"/>
      <stop offset="100%" stop-color="#C06D20"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <ellipse cx="256" cy="180" rx="200" ry="160" fill="url(#shine)" opacity="0.4"/>
  <!-- Path/Road - "El Camino" converging perspective lines -->
  <path d="M 200 420 L 240 180 L 256 180 L 256 180 L 272 180 L 312 420 Z" fill="rgba(255,255,255,0.2)" stroke="none"/>
  <line x1="200" y1="420" x2="240" y2="180" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="312" y1="420" x2="272" y2="180" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Horizon line -->
  <line x1="160" y1="180" x2="352" y2="180" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Cross at the end of the path -->
  <line x1="256" y1="80" x2="256" y2="180" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="210" y1="120" x2="302" y2="120" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Small dots representing community/people along the path -->
  <circle cx="220" cy="340" r="8" fill="white" opacity="0.6"/>
  <circle cx="292" cy="340" r="8" fill="white" opacity="0.6"/>
  <circle cx="230" cy="290" r="7" fill="white" opacity="0.5"/>
  <circle cx="282" cy="290" r="7" fill="white" opacity="0.5"/>
  <circle cx="242" cy="240" r="6" fill="white" opacity="0.4"/>
  <circle cx="270" cy="240" r="6" fill="white" opacity="0.4"/>
</svg>
